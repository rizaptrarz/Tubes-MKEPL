name: CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Continuous Integration - Build Project
        run: mvn clean compile

      - name: Continuous Testing - Run Test
        run: mvn test

      - name: Continuous Inspection - Verify Project
        run: mvn verify

      - name: Continuous Delivery - Package JAR
        run: mvn package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TUBESMKEPL-JAR
          path: target/*.jar
