name: CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      # ==========================================
      # Continuous Integration - Riza 
      # ==========================================
      - name: Continuous Integration - Build Project (Riza)
        run: mvn clean compile

      # ==========================================
      # Continuous Testing - Syahdan Mansiz Kurniawan
      # ==========================================
      - name: Continuous Testing - Run Unit Tests (Syahdan)
        run: mvn test

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

            # ==========================================
      # Continuous Inspection - Hafidz Zuhayrsh
      # ==========================================
      - name: Continuous Inspection - Verify Project (Hafidz Zuhayrsh)
        run: mvn verify

      # ==========================================
      # Continuous Delivery - Package Application
      # ==========================================
      - name: Continuous Delivery - Package JAR
        run: mvn package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TUBESMKEPL-JAR
          path: target/*.jar