name: CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      # ==========================================
      # Continuous Integration - Riza
      # ==========================================
      - name: Continuous Integration - Build Project (Riza)
        run: mvn clean compile

      # ==========================================
      # Continuous Testing - Syahdan Mansiz Kurniawan
      # ==========================================
      - name: Continuous Testing - Run Unit Tests (Syahdan)
        run: mvn test

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

      # ==========================================
      # Continuous Inspection - Hafidz Zuhayrsh
      # ==========================================
      - name: Continuous Inspection - Verify Project (Hafidz Zuhayrsh)
        run: mvn verify

      # ==========================================
      # Continuous Deployment/Delivery - Gama Pradana
      # ==========================================
      - name: Continuous Deployment/Delivery - Package JAR
        run: mvn package

      - name: Prepare Release Artifact
        run: |
          mkdir release
          cp target/*.jar release/TUBESMKEPL-${{ github.run_number }}.jar

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TUBESMKEPL-JAR
          path: release/*.jar

      - name: Continuous Deployment/Delivery - Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: release/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
